name: Preview deploy (pull requests)

# Pour chaque pull request, construit l'application et publie un
# canal de prévisualisation temporaire sur Firebase Hosting.
# L'URL de preview est postée automatiquement dans la PR.
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build_and_preview:
    # Les forks n'ont pas accès aux secrets : on saute le déploiement.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      # Vrai seulement si le secret de déploiement est configuré.
      HAS_FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}

      - name: Deploy preview channel
        # Ignoré tant que le secret FIREBASE_SERVICE_ACCOUNT n'est pas configuré.
        if: ${{ env.HAS_FIREBASE_SA == 'true' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: asf-sud-est-prod-524c1
          expires: 7d
