<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ASF Dossiers — Portail documentaire sécurisé pour les autorisations de vol de l'ASF Sud-Est." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#1b98c4" />
    <!-- Aperçu lors du partage d'un lien -->
    <meta property="og:title" content="ASF Dossiers — Aviation Sans Frontières" />
    <meta property="og:description" content="Portail documentaire sécurisé d'Aviation Sans Frontières." />
    <meta property="og:image" content="/logo-asf.png" />
    <meta property="og:type" content="website" />
    <title>ASF Dossiers — Aviation Sans Frontières</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Applique le thème avant le rendu pour éviter tout « flash » de couleur.
      (function () {
        try {
          var m = localStorage.getItem('asf_theme');
          if (m !== 'light' && m !== 'dark') {
            m = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.toggle('dark', m === 'dark');
          document.documentElement.style.colorScheme = m;
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
